name: "Bug report"
description: "Report a reproducible problem"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please provide as much detail as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: A short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, sample prompts, and API endpoint/model used
      placeholder: |
        1. Go to ...
        2. Fill ...
        3. Click ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Node version, Browser version"

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
